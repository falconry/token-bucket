name: tests

on:
  # Trigger the tests workflow on push or pull requests.
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - master

jobs:
  run_tox:
    name: tox -e ${{ matrix.toxenv }} (${{matrix.python-version}} on ${{ matrix.os }})
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
        os:
          - "ubuntu-latest"
        toxenv:
          - "ruff"
          - "typing"
          - "twine-check"
        include:
          - python-version: "3.10"
            os: ubuntu-latest
            toxenv: py310
          - python-version: "3.11"
            os: ubuntu-latest
            toxenv: py311
          - python-version: "3.12"
            os: ubuntu-latest
            toxenv: py312
          - python-version: "3.13"
            os: ubuntu-latest
            toxenv: py313
          - python-version: "3.14"
            os: ubuntu-latest
            toxenv: py314
          - python-version: "3.15.0-alpha - 3.15"
            os: ubuntu-latest
            toxenv: py315
          - python-version: "pypy3.11"
            os: ubuntu-latest
            # NOTE(vytas): do not trace coverage under PyPy, it seems it is
            #   extremely expensive under extensive threading.
            toxenv: nocover

    # Steps to run in each job.
    # Some are GitHub actions, others run shell commands.
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage tox
          python --version
          pip --version
          tox --version
          coverage --version

      - name: Run tests
        run: |
          tox -e ${{ matrix.toxenv }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        if: ${{ matrix.toxenv == 'py312' }}
        with:
          env_vars: PYTHON
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
